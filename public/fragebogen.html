<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kurze Fragen</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Frage 1 von 7</div>
        </div>

        <div class="header">
            <h1 id="stepTitle">Willkommen</h1>
            <p class="subtitle" id="stepSubtitle">Bevor wir beginnen, möchte ich Sie kurz kennenlernen.</p>
        </div>

        <form id="questionnaireForm">
            <!-- Step 1: Vorname -->
            <div class="step active" data-step="1">
                <div class="form-group">
                    <label for="firstName">Wie heißen Sie?</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Vorname" required autofocus>
                </div>
            </div>

            <!-- Step 2: Alter -->
            <div class="step" data-step="2">
                <div class="form-group">
                    <label for="age">Wie alt sind Sie?</label>
                    <input type="number" id="age" name="age" min="18" max="35" placeholder="z.B. 24" required>
                </div>
            </div>

            <!-- Step 3: Stadt -->
            <div class="step" data-step="3">
                <div class="form-group">
                    <label for="city">In welcher Stadt wohnen Sie?</label>
                    <input type="text" id="city" name="city" placeholder="z.B. Aachen" required>
                </div>
            </div>

            <!-- Step 4: Interessen -->
            <div class="step" data-step="4">
                <div class="form-group">
                    <label for="interests">Was sind Ihre aktuellen Hobbys oder Interessen?</label>
                    <input type="text" id="interests" name="interests" placeholder="z.B. Laufen, Gaming, Kochen" required>
                    <small>2-3 Stichworte, durch Kommas getrennt</small>
                </div>
            </div>

            <!-- Step 5: Letzte Käufe -->
            <div class="step" data-step="5">
                <div class="form-group">
                    <label for="lastPurchase">Welche Produktkategorie haben Sie zuletzt online gekauft?</label>
                    <select id="lastPurchase" name="lastPurchase" required>
                        <option value="">Bitte auswählen...</option>
                        <option value="mode">Mode & Bekleidung</option>
                        <option value="elektronik">Elektronik & Technik</option>
                        <option value="sport">Sport & Fitness</option>
                        <option value="haushalt">Haushalt & Wohnen</option>
                        <option value="buecher">Bücher & Medien</option>
                        <option value="beauty">Beauty & Gesundheit</option>
                        <option value="essen">Essen & Getränke</option>
                        <option value="sonstiges">Sonstiges</option>
                    </select>
                </div>
            </div>

            <!-- Step 6: Lebenssituation -->
            <div class="step" data-step="6">
                <div class="form-group">
                    <label for="lifestyle">Gibt es aktuell etwas Besonderes in Ihrem Leben?</label>
                    <select id="lifestyle" name="lifestyle" required>
                        <option value="">Bitte auswählen...</option>
                        <option value="studium">Habe gerade Studium begonnen</option>
                        <option value="umzug">Bin kürzlich umgezogen</option>
                        <option value="job">Habe neuen Job angefangen</option>
                        <option value="fitness">Starte gerade mit neuer Fitness-Routine</option>
                        <option value="beziehung">Neuer Lebensabschnitt (Beziehung/Familie)</option>
                        <option value="hobby">Neues Hobby/Projekt begonnen</option>
                        <option value="nichts">Nichts Besonderes gerade</option>
                    </select>
                </div>
            </div>

            <!-- Step 7: Gesundheit (optional) -->
            <div class="step" data-step="7">
                <div class="form-group">
                    <label for="healthFocus">Achten Sie aktuell besonders auf ein Gesundheitsthema?</label>
                    <select id="healthFocus" name="healthFocus">
                        <option value="">Möchte ich nicht angeben</option>
                        <option value="sport">Ja, mehr Sport/Bewegung</option>
                        <option value="ernaehrung">Ja, gesündere Ernährung</option>
                        <option value="schlaf">Ja, besserer Schlaf</option>
                        <option value="stress">Ja, Stressreduktion</option>
                        <option value="nein">Nein, nicht speziell</option>
                    </select>
                    <small>Optional - nur wenn Sie möchten</small>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="btn-group">
                <button type="button" class="btn-secondary" id="prevBtn" style="display: none;">Zurück</button>
                <button type="button" class="btn-primary" id="nextBtn">Weiter</button>
            </div>
        </form>
    </div>

    <script src="js/fragebogen.js"></script>
</body>
</html>
