<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moderator Panel</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="mod-body">
    <div class="mod-container">
        <!-- Left Column: Transcript -->
        <div class="mod-left">
            <div class="mod-section-header">
                <h2>Transkript</h2>
                <span class="mod-badge" id="transcriptStatus">Wird geladen...</span>
            </div>
            <div class="transcript-area" id="transcriptArea">
                <p class="mod-placeholder">Warte auf Transkription...</p>
            </div>
        </div>

        <!-- Right Column: Controls -->
        <div class="mod-right">
            <!-- Status -->
            <div class="mod-card">
                <h3>Status</h3>
                <p id="statusText" class="mod-status-text">Verarbeite Audio...</p>
                <div class="mod-progress-bar">
                    <div class="mod-progress-fill" id="progressBar"></div>
                </div>
            </div>

            <!-- Profile -->
            <div class="mod-card" id="profileCard" style="display: none;">
                <h3>Extrahiertes Profil</h3>
                <div id="profileContent" class="mod-profile"></div>
            </div>

            <!-- Level Slider -->
            <div class="mod-card" id="levelCard" style="display: none;">
                <h3>Personalisierungs-Level</h3>
                <input type="range" min="1" max="5" value="3" class="mod-slider" id="levelSlider">
                <div class="mod-level-labels">
                    <span>1 Subtil</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5 Extrem</span>
                </div>
                <p class="mod-level-desc" id="levelDesc">Stark: Interessen-spezifische Produkte, persönliche Nachrichten</p>
                <button class="btn-generate" id="generateBtn">Shop generieren</button>
            </div>

            <!-- Shop Controls (after generation) -->
            <div class="mod-card" id="shopControls" style="display: none;">
                <h3>Shop-Steuerung</h3>
                <div class="stage-buttons-mod">
                    <button class="btn-stage-mod active" data-stage="generic">Generic (Baseline)</button>
                    <button class="btn-stage-mod" data-stage="personalized">Personalisiert</button>
                    <button class="btn-stage-mod" data-stage="transparent">Transparent</button>
                </div>
                <button class="btn-release" id="releaseBtn" style="display: none;">Shop für Teilnehmer freigeben</button>
                <button class="btn-ratings" id="ratingsBtn" style="display: none;">Mini-Ratings beim Teilnehmer anzeigen</button>
                <p id="ratingsResult" style="display: none; margin-top: 12px; font-size: 13px; opacity: 0.7;"></p>
                <div class="mod-link-box" id="linkBox" style="display: none;">
                    <label>Teilnehmer-Link:</label>
                    <input type="text" id="participantLink" readonly>
                </div>
            </div>
        </div>
    </div>
    <script src="js/moderator.js"></script>
</body>
</html>
